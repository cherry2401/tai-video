<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/logo_taivideo.svg" />
    <title>TaiVideo - Tải Video Đa Nền Tảng</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>

        darkMode: 'class',

          extend: {
            colors: {
              gray: {
                850: '#1f2937', // Custom dark gray matching header

        }

        font-family: 'Codec Pro Bold', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      }

        font-family: 'Geomanist', ui-sans-serif, system-ui, sans-serif;
      }

      body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
